<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Happy Women's Day</title>
    <style>
        body {
            background: linear-gradient(pink, lightyellow);
            text-align: center;
            font-family: Arial, sans-serif;
            padding-top: 100px;
        }

        h1 {
            color: purple;
            font-size: 50px;
            text-shadow: 2px 2px white;
        }

        p {
            font-size: 22px;
            color: darkred;
        }

        .flowers {
            font-size: 40px;
            margin-top: 20px;
        }

        .box {
            background: white;
            display: inline-block;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0px 0px 15px gray;
        }
    </style>
</head>
<body>

<div class="box">
    <div class="flowers">🌸 🌷 🌹 🌺 🌼</div>
    
    <h1>Happy women's Day</h1>
    
    <p>
        Wishing all the wonderful women a day filled with love, respect, and happiness.  
        You make the world beautiful and stronger every day!
    </p>

    <div class="flowers">🌼 🌺 🌹 🌷 🌸</div>
</div>

</body>
</html>
